<div class="app-layout" style="display: block; width: 100%;">
    <main class="main-content" style="width: 100%; max-width: 100%; margin: 0; padding: 20px;">
        <header class="top-header" style="display: flex; justify-content: space-between; align-items: center; padding: 16px 24px; background: white; border-bottom: 1px solid #e2e8f0; margin-bottom: 24px;">
            <div class="logo-area" style="font-weight: 700; font-size: 1.25rem; color: #1e293b;">
              <a routerLink="/dashboard" style="text-decoration: none; color: inherit;">AI Dashboard</a>
            </div>
            <div class="header-actions" style="display: flex; gap: 16px; align-items: center;">
              <a routerLink="/dashboard" class="action-btn" style="text-decoration: none; color: #334155; font-weight: 500;">Dashboard</a>
              @if (isAdmin) {
                <a routerLink="/ai-config" class="action-btn.special" style="text-decoration: none; color: #8b5cf6; font-weight: 600; padding: 6px 12px; background: #ede9fe; border-radius: 6px;">AI Settings (Admin)</a>
              }
              <button (click)="logout()" class="action-btn" style="background: none; border: none; cursor: pointer; color: #ef4444; font-weight: 500;">Logout</button>
            </div>
        </header>
        <div class="page-container">
            <router-outlet></router-outlet>
        </div>
    </main>
</div>
